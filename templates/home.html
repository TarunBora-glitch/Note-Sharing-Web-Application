<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteVerse - Home</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body>
    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">
            <i class="fa-solid fa-book-open"></i>
            <span>NoteHub</span>
        </div>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" placeholder="Search notes..." class="search-input">
        </div>

        <div class="nav-links">
            <a href="{{ url_for('home_page') }}" class="nav-link active">Home</a>
            <a href="{{ url_for('browse_notes') }}" class="nav-link">Browse Notes</a>
            <a href="{{ url_for('profile') }}" class="nav-link">Profile</a>
        </div>
        
    </div>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- WELCOME -->
        <div class="welcome">
            <div class="welcome-content">
                <h2>Welcome back, Tarun 👋</h2>
                <p>Jump back into your notes, upload new resources, or review what you saved recently.</p>
                <span class="email">Signed in as abc@gmail.com</span>
            </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="actions">
            <a href="{{ url_for('upload_notes') }}" class="action-btn primary">
                <i class="fas fa-upload"></i>
                <span>Upload Notes</span>
            </a>
            <a href="{{ url_for('browse_notes') }}" class="action-btn secondary">
                <i class="fas fa-book"></i>
                <span>Browse Notes</span>
            </a>
        </div>


    </div>
</body>
</html>
